<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Hub</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="shortcut icon" href="https://ssl.gstatic.com/analytics/20160927/bigquery/ic_bigquery_64px.png" type="image/png">
</head>
<body>
    <!-- Background blur mesh -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-wrapper">
                    <!-- BigQuery Logo (SVG representation) -->
                    <svg class="bq-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2005/svg">
                        <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM17 17H7V15H17V17ZM17 13H7V11H17V13ZM13 9H7V7H13V9Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>BigQuery Release Hub</h1>
                    <p class="subtitle">Stay updated with Google BigQuery feed releases & compose posts</p>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot green"></span>
                    <span id="last-updated-text">Checking feed...</span>
                </div>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Search, Filter & Bulk Select Bar -->
        <section class="controls-panel">
            <div class="search-box-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Search updates (e.g. Gemini, SQL, Partitioning)..." aria-label="Search updates">
            </div>

            <div class="filter-group">
                <span class="filter-label">Filter Types:</span>
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-tab active" data-type="all">All <span class="badge" id="count-all">0</span></button>
                    <button class="filter-tab" data-type="feature">Features <span class="badge badge-feature" id="count-feature">0</span></button>
                    <button class="filter-tab" data-type="issue">Issues <span class="badge badge-issue" id="count-issue">0</span></button>
                    <button class="filter-tab" data-type="other">Other <span class="badge badge-other" id="count-other">0</span></button>
                </div>
            </div>

            <div class="bulk-actions" id="bulk-actions">
                <button id="select-all-btn" class="btn btn-secondary btn-sm"><i class="fa-regular fa-square-check"></i> Select Page</button>
                <button id="clear-selection-btn" class="btn btn-secondary btn-sm" disabled><i class="fa-regular fa-square"></i> Clear Selected</button>
            </div>
        </section>

        <!-- Notification Banner -->
        <div id="notification-banner" class="notification-banner hide">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="notification-msg"></span>
            <button class="close-banner-btn" onclick="document.getElementById('notification-banner').classList.add('hide')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Release Notes Cards Grid -->
        <main class="release-grid-container">
            <div class="release-grid" id="release-grid">
                <!-- Skeletons shown during initial load -->
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </main>
    </div>

    <!-- Floating Tweet Actions Bar -->
    <div class="floating-selection-bar" id="floating-bar">
        <div class="floating-bar-content">
            <div class="selection-info">
                <span class="selection-count" id="selection-count-badge">0</span>
                <span class="selection-text">updates selected</span>
            </div>
            <div class="floating-actions">
                <button id="tweet-composer-trigger-btn" class="btn btn-accent">
                    <i class="fa-brands fa-x-twitter"></i>
                    <span>Draft Tweet</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Tweet Composer Modal -->
    <div class="modal-backdrop" id="tweet-modal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <i class="fa-brands fa-x-twitter modal-logo"></i>
                    <h2>Compose X/Twitter Post</h2>
                </div>
                <button class="modal-close-btn" id="modal-close-btn" aria-label="Close modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="tweet-composer-wrapper">
                    <textarea id="tweet-textarea" placeholder="What's happening? Compose your release notes tweet..." rows="8"></textarea>
                    
                    <div class="composer-meta">
                        <div class="char-count-wrapper">
                            <svg class="progress-ring" width="24" height="24">
                                <circle class="progress-ring-bg" stroke="#1f2937" stroke-width="2" fill="transparent" r="9" cx="12" cy="12" />
                                <circle id="progress-circle" class="progress-ring-indicator" stroke="var(--primary)" stroke-width="2.5" fill="transparent" r="9" cx="12" cy="12" />
                            </svg>
                            <span id="char-counter">0 / 280</span>
                        </div>
                    </div>
                </div>

                <div class="preset-templates-group">
                    <span class="presets-label">Shortcuts:</span>
                    <div class="preset-chips">
                        <button class="preset-chip" data-action="hashtag" data-value="#BigQuery">#BigQuery</button>
                        <button class="preset-chip" data-action="hashtag" data-value="#GoogleCloud">#GoogleCloud</button>
                        <button class="preset-chip" data-action="hashtag" data-value="#DataAnalytics">#DataAnalytics</button>
                        <button class="preset-chip" data-action="template" data-value="standard">📢 Standard Intro</button>
                        <button class="preset-chip" data-action="template" data-value="summary">💡 Summary Style</button>
                        <button class="preset-chip" data-action="template" data-value="reset">🔄 Reset Text</button>
                    </div>
                </div>

                <div class="tweet-preview-section">
                    <span class="preview-label">Selected Updates in Draft:</span>
                    <div class="preview-updates-list" id="preview-updates-list">
                        <!-- Dynamic list of titles -->
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="copy-tweet-btn" class="btn btn-secondary">
                    <i class="fa-regular fa-copy"></i>
                    <span>Copy Text</span>
                </button>
                <button id="submit-tweet-btn" class="btn btn-accent">
                    <i class="fa-brands fa-x-twitter"></i>
                    <span>Post to X</span>
                </button>
            </div>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
